apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: flask-demo

  template:
    metadata:
      labels:
        app: flask-demo

    spec:
      containers:
      - name: flask-demo
        image: madasrushi0804/flask-demo:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 5000